<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>photos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Caveat:wght@600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Poppins,sans-serif;
    background:linear-gradient(135deg,#ffe6ef,#ffd1dc);
    overflow:hidden;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Floating Hearts */

.hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.heart{
    position:absolute;
    color:#ff76a8;
    animation:float 8s linear infinite;
    opacity:.6;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }
    20%{
        opacity:.8;
    }
    to{
        transform:translateY(-120px) scale(1.3);
        opacity:0;
    }
}

/* Back Button */

.back{
    position:fixed;
    top:20px;
    left:20px;
    text-decoration:none;
    background:white;
    color:#ff5d96;
    padding:10px 20px;
    border-radius:30px;
    font-weight:600;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
    transition:.3s;
}

.back:hover{
    background:#ff5d96;
    color:white;
}

/* Gallery */

.gallery{
    width:900px;
    height:600px;
    position:relative;
}

.title{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    font-family:"Caveat",cursive;
    font-size:42px;
    color:#d85c8d;
}

.photo{
    position:absolute;
    width:140px;
    background:white;
    padding:10px;
    border-radius:4px;
    box-shadow:0 12px 25px rgba(0,0,0,.15);
    transition:.35s;
}

.photo img{
    width:100%;
    display:block;
}

.photo:hover{
    transform:scale(1.08) rotate(0deg);
    z-index:10;
}

/* Placement */

.p1{top:70px;left:20px;transform:rotate(-8deg);}
.p2{top:10px;left:180px;transform:rotate(6deg);}
.p3{top:100px;left:360px;transform:rotate(-5deg);}
.p4{top:20px;right:180px;transform:rotate(8deg);}
.p5{top:170px;right:20px;transform:rotate(-6deg);}
.p6{bottom:90px;left:120px;transform:rotate(7deg);}
.p7{bottom:120px;left:370px;transform:rotate(-4deg);}
.p8{bottom:80px;right:120px;transform:rotate(5deg);}
</style>
</head>
<body>

<div class="hearts"></div>

<a href="sen.html" class="back">← Back</a>

<div class="gallery">

<div class="photo p1"><img src="images/image1.jpg"></div>
<div class="photo p2"><img src="images/image2.jpg"></div>
<div class="photo p3"><img src="images/image3.jpg"></div>
<div class="photo p4"><img src="images/image4.jpg"></div>
<div class="photo p5"><img src="images/image5.jpg"></div>
<div class="photo p6"><img src="images/image6.jpg"></div>
<div class="photo p7"><img src="images/image7.jpg"></div>
<div class="photo p8"><img src="images/image8.jpg"></div>

<div class="title">
our pix together♡
</div>

</div>

<script>
const hearts=document.querySelector(".hearts");

function makeHeart(){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(15+Math.random()*25)+"px";
    heart.style.animationDuration=(5+Math.random()*5)+"s";

    hearts.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);
}

setInterval(makeHeart,350);
</script>

</body>
</html>
