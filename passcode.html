<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>last card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#ffe6ef,#ffd1dc);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:380px;
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    position:relative;
    z-index:2;
}

img{
    width:120px;
}

h1{
    color:#d96d92;
    margin-top:10px;
}

p{
    color:#9b6c7f;
    margin:10px 0 25px;
}

input{
    width:220px;
    padding:12px;
    border-radius:12px;
    border:2px solid #f5b7cb;
    text-align:center;
    font-size:18px;
}

button{
    margin-top:18px;
    width:220px;
    padding:12px;
    border:none;
    border-radius:30px;
    background:#f7a8c3;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#ef89af;
}

.back{
    position:fixed;
    top:20px;
    left:20px;
    text-decoration:none;
    background:white;
    color:#ff5d96;
    padding:10px 20px;
    border-radius:30px;
    font-weight:600;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
    transition:.3s;
}

.back:hover{
    background:#ff5d96;
    color:white;
}

.heart{
    position:fixed;
    bottom:-20px;
    color:#ff8fb1;
    animation:float 8s linear infinite;
    opacity:.7;
}

@keyframes float{

0%{
transform:translateY(0);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}
</style>

</head>

<body>

<a href="sen.html" class="back">← Back</a>

<div class="container">

<img src="hello.gif">

<h1>last one mwehehehe</h1>

<p>enter our passcode</p>

<input
type="password"
id="passcode"
placeholder="Passcode">

<br>

<button onclick="unlock()">
UNLOCK
</button>

</div>

<script>

function unlock(){

const code=document.getElementById("passcode").value;

if(code==="010723"){

window.location="card.html";

}

else{

alert("Wrong passcode 💗");

}

}

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=Math.random()*20+15+"px";

heart.style.animationDuration=Math.random()*5+5+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},9000);

}

setInterval(createHeart,350);

</script>

</body>
</html>
