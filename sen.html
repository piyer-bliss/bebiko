<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cards</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffeef2;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{
    width:900px;
    background:#ffdfe8;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
    position:relative;
    z-index:1;
}

h1{
    text-align:center;
    color:#c2456f;
    font-size:45px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-top:10px;
    margin-bottom:35px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:30px;
}

.card{
    background:white;
    height:170px;
    border-radius:22px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    font-size:70px;
    border:3px solid #ffc3d4;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
    box-shadow:0 10px 25px rgba(255,105,180,.25);
}

.fheart{
    position:fixed;
    pointer-events:none;
    animation:floatHeart 5s ease-in infinite;
    opacity:0;
    z-index:0;
}

@keyframes floatHeart{
    0%  { transform:translateY(0) scale(1); opacity:0.7; }
    100%{ transform:translateY(-110vh) scale(0.5); opacity:0; }
}
</style>

</head>
<body>

<div class="container">

    <h1>cards for you</h1>
    <p class="subtitle">tap a card (last ribbon)</p>

    <div class="cards">

        <a href="photo.html" class="card">
            📸
        </a>

        <a href="letter.html" class="card">
            💌
        </a>

        <a href="passcode.html" class="card">
            🎀
        </a>

        <a href="flowers.html" class="card">
            💐
        </a>

    </div>

</div>

<script>
  const emojis = ['💗','💕','💖','🌸','💓','✨'];

  setInterval(() => {
    const h = document.createElement('span');
    h.classList.add('fheart');
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = (5 + Math.random() * 90) + '%';
    h.style.bottom = '0';
    h.style.fontSize = (0.8 + Math.random() * 1) + 'rem';
    h.style.animationDuration = (4 + Math.random() * 4) + 's';
    h.style.animationDelay = '0s';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 8000);
  }, 1000);
</script>

</body>
</html>
