<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my baby</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#ffeef3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* Floating hearts */

.hearts span{
position:absolute;
color:#ff7ea8;
font-size:20px;
animation:float 8s linear infinite;
opacity:.6;
}

.hearts span:nth-child(1){left:10%;animation-delay:0s;}
.hearts span:nth-child(2){left:25%;animation-delay:2s;}
.hearts span:nth-child(3){left:45%;animation-delay:4s;}
.hearts span:nth-child(4){left:70%;animation-delay:1s;}
.hearts span:nth-child(5){left:90%;animation-delay:3s;}

@keyframes float{
0%{
transform:translateY(100vh);
}
100%{
transform:translateY(-120vh);
}
}

.container{
width:900px;
background:#ffe1e8;
border-radius:25px;
padding:40px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.15);
position:relative;
}

.song{
position:absolute;
top:20px;
right:20px;
padding:10px 18px;
border:none;
background:#ff88a8;
color:white;
border-radius:30px;
cursor:pointer;
}

h3{
margin-top:20px;
color:#9c4b63;
}

h1{
margin:20px;
color:#7d2f47;
font-size:40px;
}

.cat{
width:10px;
margin:auto;
display:block;
}

.buttons{
display:flex;
justify-content:center;
gap:30px;
margin-top:30px;
}

button{
padding:15px 35px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.yes{
background:#ff7ea8;
color:white;
}

.no{
background:#ffd2dd;
color:#b85777;
}

button:hover{
transform:scale(1.08);
}
</style>
</head>

<body>

<div class="hearts">
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
</div>

<div class="container">

<button class="song" onclick="toggleMusic()">
▶ song for you
</button>

<!-- Replace with your GIF -->

<h3>hayi baby</h3>

<h1>my gift for u</h1>

<div class="buttons">
<button class="yes" onclick="startGift()">
OPEN
</button>

<button class="no" onclick="sayNo()">
NO THANKS
</button>
</div>

</div>

<audio id="music" src="Oasis - Wonderwall.mp3"></audio>

<script>

function toggleMusic(){
const music=document.getElementById("music");

if(music.paused){
music.play();
}else{
music.pause();
}
}

function startGift(){
window.location.href="sen.html";
}

let messages=[
"sure yan?",
"pwetty please?",
"i literally made this just for you",
"one click won't hurt",
"you know you want to"
];

let index=0;

function sayNo(){

alert(messages[index]);

index++;

if(index>=messages.length){
index=0;
}

}

</script>

</body>
</html>
