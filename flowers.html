<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flowers</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Cherry+Bomb+One&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#ffe6ef,#ffd1dc);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

.container{
    width:90%;
    max-width:1100px;
    background:#fff0f5;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    position:relative;
}

h1{
    text-align:center;
    color:#d45d79;
    margin-bottom:25px;
}

.content{
    display:grid;
    grid-template-columns:1fr 320px 1fr;
    gap:25px;
    align-items:center;
}

.messages{
    display:flex;
    flex-direction:column;
    gap:25px;
}

.note{
    background:white;
    border:2px solid #ffc0cb;
    border-radius:15px;
    padding:15px;
    text-align:center;
    color:#b84f6a;
    box-shadow:0 5px 12px rgba(0,0,0,.08);

    opacity:0;
    transform:scale(.3);

    animation:popUp .8s forwards;
}

.note:hover{
    transform:scale(1.05);
    box-shadow:0 8px 18px rgba(0,0,0,.15);
}

.note:nth-child(1){animation-delay:.5s;}
.note:nth-child(2){animation-delay:1.1s;}
.note:nth-child(3){animation-delay:1.7s;}

.messages:last-child .note:nth-child(1){animation-delay:2.3s;}
.messages:last-child .note:nth-child(2){animation-delay:2.9s;}
.messages:last-child .note:nth-child(3){animation-delay:3.5s;}

@keyframes popUp{
    0%{
        opacity:0;
        transform:scale(.2);
    }

    70%{
        opacity:1;
        transform:scale(1.08);
    }

    100%{
        opacity:1;
        transform:scale(1);
    }
}

.bouquet{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffd8e5;
    border-radius:20px;
    padding:20px;

    opacity:0;
    animation:showBouquet 1s forwards;
}

@keyframes showBouquet{
    from{
        opacity:0;
        transform:scale(.5);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

.bouquet img{
    width:100%;
    max-width:240px;
    animation:float 3s ease-in-out infinite 1s;
}

@keyframes float{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-12px);
    }
    100%{
        transform:translateY(0px);
    }
}

@media(max-width:850px){

.content{
    grid-template-columns:1fr;
}

.bouquet{
    order:-1;
}
body{
    font-family:'Fredoka', sans-serif;
}

h1{
    font-family:'Cherry Bomb One', cursive;
}

}

.back{
    position:fixed;
    top:20px;
    left:20px;
    text-decoration:none;
    background:white;
    color:#ff5d96;
    padding:10px 20px;
    border-radius:30px;
    font-weight:600;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
    transition:.3s;
}

.back:hover{
    background:#ff5d96;
    color:white;
}

</style>

</head>

<body>

<div class="container">

<a href="sen.html" class="back">← Back</a>

<h1>flowers for u baby</h1>

<div class="content">

<div class="messages">

<div class="note">
every day with you feels like a blessing.
</div>

<div class="note">
you make my world brighter just by being in it.
</div>

<div class="note">
i'm so proud of you in everything, always proud of you.
</div>

</div>

<div class="bouquet">
<img src="carns.png" alt="Bouquet">
</div>

<div class="messages">

<div class="note">
your smile is my favorite place.
</div>

<div class="note">
loving you is the easiest thing i've ever done.
</div>

<div class="note">
with you, everything feels right.
</div>

</div>

</div>

</div>

</body>
</html>
